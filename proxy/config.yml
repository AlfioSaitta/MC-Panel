listeners:
- query_port: 25565
  motd: '&1Another Bungee server'
  tab_list: GLOBAL_PING
  query_enabled: false
  proxy_protocol: false
  forced_hosts: {}
  ping_passthrough: false
  priorities:
  - lobby
  bind_local_address: true
  host: 0.0.0.0:25565
  max_players: 100
  tab_size: 60
  force_default_server: false
network_compression_threshold: 256
permissions:
  default:
  - bungeecord.command.server
  - bungeecord.command.list
  admin:
  - bungeecord.command.alert
  - bungeecord.command.end
  - bungeecord.command.ip
  - bungeecord.command.reload
log_pings: true
connection_throttle_limit: -1
server_connect_timeout: 5000
timeout: 30000
player_limit: -1
prevent_proxy_connections: false
ip_forward: true
groups:
  LeonardoGam:
  - admin
connection_throttle: -1
servers:
  lobby:
    motd: '&1Lobby'
    address: lobby:25565
    restricted: false
  survival:
    motd: '&1Survival'
    address: survival:25565
    restricted: false
  creative:
    motd: '&1Creative'
    address: creative:25565
    restricted: false
  medioeval:
    motd: '&1Medioeval'
    address: medioeval:25565
    restricted: false
  motoleo:
    motd: '&1Motoleo'
    address: motoleo:25565
    restricted: false
online_mode: false
