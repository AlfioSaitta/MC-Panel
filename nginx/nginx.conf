user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       80;
        server_name  localhost;

        # DNS resolver di Docker interno per non fixare l'IP nella cache di Nginx
        resolver 127.0.0.11 valid=10s;

        # Web Panel (Next.js)
        location / {
            set $panel_upstream "http://panel:3000";
            proxy_pass $panel_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # BlueMap Proxies
        location /bluemap/lobby/ {
            set $bm_lobby http://mc_lobby:8100;
            rewrite ^/bluemap/lobby/(.*)$ /$1 break;
            proxy_pass $bm_lobby;
        }
        location /bluemap/survival/ {
            set $bm_survival http://mc_survival:8100;
            rewrite ^/bluemap/survival/(.*)$ /$1 break;
            proxy_pass $bm_survival;
        }
        location /bluemap/creative/ {
            set $bm_creative http://mc_creative:8100;
            rewrite ^/bluemap/creative/(.*)$ /$1 break;
            proxy_pass $bm_creative;
        }
        location /bluemap/medioeval/ {
            set $bm_medioeval http://mc_medioeval:8100;
            rewrite ^/bluemap/medioeval/(.*)$ /$1 break;
            proxy_pass $bm_medioeval;
        }
        location /bluemap/motoleo/ {
            set $bm_motoleo http://mc_motoleo:8100;
            rewrite ^/bluemap/motoleo/(.*)$ /$1 break;
            proxy_pass $bm_motoleo;
        }
    }
}
