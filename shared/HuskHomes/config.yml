database:
  type: MARIADB
  credentials:
    host: "__MYSQL_HOST__"
    port: __MYSQL_PORT__
    database: "__MYSQL_DB__"
    username: "__MYSQL_USER__"
    password: "__MYSQL_PASSWORD__"
  connection_pool:
    maximum_pool_size: 10
cross_server:
  enabled: true
  broker_type: REDIS
  redis:
    host: "__REDIS_HOST__"
    port: __REDIS_PORT__
    password: "__REDIS_PASSWORD__"
messages:
  format: MINIMESSAGE
